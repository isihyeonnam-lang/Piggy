<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy VIP Lounge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #e94560;
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --vvip-color: #f1c40f;
        }

        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }

        .hero-img {
            width: 180px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 25px;
            filter: drop-shadow(0 5px 15px rgba(233, 69, 96, 0.3));
        }

        h1 { color: var(--primary-color); margin-bottom: 10px; font-size: 2rem; }
        .description { color: #95a5a6; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; }

        #status {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            white-space: pre-line; /* 줄바꿈 허용 */
        }
        .success { background: rgba(78, 204, 163, 0.15); color: #4ecca3; border: 1px solid #4ecca3; }
        .fail { background: rgba(233, 69, 96, 0.15); color: #e94560; border: 1px solid #e94560; }
        .vvip-status { background: rgba(241, 196, 15, 0.15); color: var(--vvip-color); border: 1px solid var(--vvip-color); }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        #authBtn { background: var(--primary-color); color: white; }
        #gameBtn { background: #4ecca3; color: white; }
        #vvipBtn { background: var(--vvip-color); color: #1a1a2e; }
        
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* 처음엔 인증 버튼만 보이게 설정 */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="Gemini_Generated_Image_bf3ambf3ambf3amb.png" alt="Crown Pig" class="hero-img">
        
        <h1>Piggy VIP Lounge</h1>
        <p class="description">
            인증을 통해 입장 등급을 확인하세요.<br>
            <b>1,000 PIGI</b>: VIP 🕹<br>
            <b>10,000,001 PIGI</b>: VVIP 👑
        </p>

        <div id="status"></div>

        <!-- 인증 전 버튼 -->
        <button id="authBtn" class="btn" onclick="checkToken()">지갑 연결 및 등급 확인</button>
        
        <!-- 인증 후 나타날 버튼들 -->
        <div id="actionButtons" class="hidden">
            <button id="gameBtn" class="btn" onclick="enterRoom('VIP')">🕹 VIP 방 입장</button>
            <button id="vvipBtn" class="btn" onclick="enterRoom('VVIP')">👑 VVIP 방 입장</button>
        </div>
    </div>

    <script>
        const PIGGY_ADDRESS = "0xd371B8EDE3329bb476f8AAF548b8fAc0e9910EA5";
        const MIN_BALANCE = 1000;
        const VVIP_BALANCE = 10000001;
        let userBalance = 0; // 전역 변수로 잔액 저장

        async function checkToken() {
            const statusDiv = document.getElementById('status');
            const authBtn = document.getElementById('authBtn');
            const actionButtons = document.getElementById('actionButtons');

            if (typeof window.ethereum === 'undefined') {
                alert("메타마스크를 설치해주세요!");
                return;
            }

            try {
                statusDiv.style.display = "block";
                statusDiv.innerText = "⏳ 보유량을 확인 중입니다...";

                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const userAddress = await signer.getAddress();

                const abi = ["function balanceOf(address account) view returns (uint256)"];
                const contract = new ethers.Contract(PIGGY_ADDRESS, abi, provider);

                const balanceRaw = await contract.balanceOf(userAddress);
                userBalance = parseFloat(ethers.utils.formatEther(balanceRaw));

                authBtn.classList.add('hidden');
                actionButtons.classList.remove('hidden');

                if (userBalance >= VVIP_BALANCE) {
                    statusDiv.className = "vvip-status";
                    statusDiv.innerHTML = `👑 VVIP 등급 확인!\n(보유: ${userBalance.toLocaleString()} PIGI)`;
                } else if (userBalance >= MIN_BALANCE) {
                    statusDiv.className = "success";
                    statusDiv.innerHTML = `✅ VIP 등급 확인!\n(보유: ${userBalance.toLocaleString()} PIGI)`;
                } else {
                    statusDiv.className = "fail";
                    statusDiv.innerHTML = `❌ 자격 미달\n(보유: ${userBalance.toLocaleString()} PIGI)`;
                }
            } catch (err) {
                console.error(err);
                statusDiv.className = "fail";
                statusDiv.innerText = "오류가 발생했습니다.";
            }
        }

        // 💡 [핵심 추가] 입장 버튼 클릭 시 체크 함수
        function enterRoom(type) {
            const statusDiv = document.getElementById('status');

            if (type === 'VVIP') {
                if (userBalance >= VVIP_BALANCE) {
                    location.href = 'game.html'; // VVIP 성공 시 이동
                } else {
                    // ㅄ 메시지 출력 로직
                    statusDiv.className = "fail";
                    statusDiv.innerHTML = `ㅋㅋ ㅄ\n(VVIP는 ${VVIP_BALANCE.toLocaleString()}개부터임)`;
                    alert("ㅋㅋ ㅄ");
                }
            } else {
                if (userBalance >= MIN_BALANCE) {
                    location.href = 'game.html'; // VIP 성공 시 이동
                } else {
                    alert("VIP 자격도 없습니다.");
                }
            }
        }
    </script>
</body>
</html>
