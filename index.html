<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy VIP Lounge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #e94560;
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --vvip-color: #f1c40f;
            --success-color: #4ecca3;
        }
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .hero-img {
            width: 180px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 25px;
            filter: drop-shadow(0 5px 15px rgba(233, 69, 96, 0.3));
        }
        h1 { color: var(--primary-color); margin-bottom: 10px; font-size: 2rem; }
        .description { color: #95a5a6; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; }
        #status {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            display: none;
            white-space: pre-line;
            line-height: 1.5;
        }
        .success { background: rgba(78, 204, 163, 0.15); color: var(--success-color); border: 1px solid var(--success-color); }
        .fail { background: rgba(233, 69, 96, 0.15); color: var(--primary-color); border: 1px solid var(--primary-color); }
        .vvip-status { background: rgba(241, 196, 15, 0.15); color: var(--vvip-color); border: 1px solid var(--vvip-color); }
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        #authBtn { background: var(--primary-color); color: white; }
        #gameBtn { background: var(--success-color); color: white; }
        #vvipBtn { background: var(--vvip-color); color: #1a1a2e; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="pig.png" alt="Crown Pig" class="hero-img">
        <h1>Piggy VIP Lounge</h1>
        <p class="description">
            인증을 통해 입장 등급을 확인하세요.<br>
            <b>1,000 PIGI</b>: VIP 🕹<br>
            <b>10,000,001 PIGI</b>: VVIP 👑
        </p>
        <div id="status"></div>
        <button id="authBtn" class="btn" onclick="checkToken()">지갑 연결 및 등급 확인</button>
        <div id="actionButtons" class="hidden">
            <button id="gameBtn" class="btn" onclick="enterRoom('VIP')">🕹 VIP 방 입장</button>
            <button id="vvipBtn" class="btn" onclick="enterRoom('VVIP')">👑 VVIP 방 입장</button>
        </div>
    </div>

    <script>
        const PIGGY_ADDRESS = "0xd371B8EDE3329bb476f8AAF548b8fAc0e9910EA5";
        const MIN_BALANCE = 1000;
        const VVIP_BALANCE = 10000001;
        let userBalance = 0;
        let isVerified = false;

        async function checkToken() {
            const statusDiv = document.getElementById('status');
            const authBtn = document.getElementById('authBtn');
            const actionButtons = document.getElementById('actionButtons');

            // 💡 모바일 환경 디버깅: 메타마스크 앱 내 브라우저로 강제 이동
            const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
            const isInMetaMask = typeof window.ethereum !== 'undefined' && window.ethereum.isMetaMask;

            if (isMobile && !isInMetaMask) {
                // 현재 URL에서 http/https 프로토콜 제거 후 메타마스크 딥링크 결합
                const pureUrl = window.location.href.replace(/^https?:\/\//, "");
                location.href = "https://metamask.app.link/dapp/" + pureUrl;
                return;
            }

            try {
                statusDiv.style.display = "block";
                statusDiv.innerText = "⏳ 보유량을 확인 중입니다...";

                if (typeof window.ethereum === 'undefined') {
                    throw new Error("No Wallet");
                }

                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const userAddress = await signer.getAddress();

                const abi = ["function balanceOf(address account) view returns (uint256)"];
                const contract = new ethers.Contract(PIGGY_ADDRESS, abi, provider);

                const balanceRaw = await contract.balanceOf(userAddress);
                userBalance = parseFloat(ethers.utils.formatEther(balanceRaw));
                isVerified = true;

            } catch (err) {
                console.log("인증 실패: ", err.message);
                userBalance = 0; 
                isVerified = true; 
            }

            authBtn.classList.add('hidden');
            actionButtons.classList.remove('hidden');

            if (userBalance >= VVIP_BALANCE) {
                statusDiv.className = "vvip-status";
                statusDiv.innerHTML = `👑 VVIP 등급 확인!\n(보유: ${userBalance.toLocaleString()} PIGI)`;
            } else if (userBalance >= MIN_BALANCE) {
                statusDiv.className = "success";
                statusDiv.innerHTML = `✅ VIP 등급 확인!\n(보유: ${userBalance.toLocaleString()} PIGI)`;
            } else {
                statusDiv.className = "fail";
                statusDiv.innerHTML = `❌ 자격 미달\n(보유: ${userBalance.toLocaleString()} PIGI)\nVIP도 못 들어오네 ㅉㅉ PIGI 사라`;
            }
        }

        function enterRoom(type) {
            const statusDiv = document.getElementById('status');
            if (!isVerified) {
                alert("먼저 인증 버튼을 눌러주세요!");
                return;
            }
            if (type === 'VVIP') {
                if (userBalance >= VVIP_BALANCE) {
                    location.href = 'game.html'; 
                } else {
                    statusDiv.className = "fail";
                    statusDiv.innerHTML = `ㅋㅋ ㅄ\n(VVIP는 ${VVIP_BALANCE.toLocaleString()}개부터임)`;
                    alert("ㅋㅋ ㅄ");
                }
            } else {
                if (userBalance >= MIN_BALANCE) {
                    location.href = 'game.html'; 
                } else {
                    statusDiv.className = "fail";
                    statusDiv.innerHTML = `VIP도 못 들어오네 ㅉㅉ PIGI 사라`;
                    alert("VIP도 못 들어오네 ㅉㅉ PIGI 사라");
                }
            }
        }
    </script>
</body>
</html>
