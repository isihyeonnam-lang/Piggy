<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy Lounge</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --primary-color: #e94560;
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --vvip-color: #f1c40f;
            --success-color: #4ecca3;
            --normal-color: #95a5a6;
        }
        body {
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 450px;
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .hero-img {
            width: 150px;
            height: auto;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        h1 { color: var(--primary-color); margin-bottom: 8px; font-size: 1.8rem; }
        .description { color: #95a5a6; font-size: 0.85rem; line-height: 1.5; margin-bottom: 25px; }
        #status {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            white-space: pre-line;
            line-height: 1.5;
        }
        .info-box { background: rgba(233, 69, 96, 0.1); border: 1px solid var(--primary-color); color: white; }
        .success { background: rgba(78, 204, 163, 0.1); border: 1px solid var(--success-color); color: var(--success-color); }
        .vvip-status { background: rgba(241, 196, 15, 0.1); border: 1px solid var(--vvip-color); color: var(--vvip-color); }
        
        .btn { width: 100%; padding: 15px; font-size: 1rem; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #authBtn { background: var(--primary-color); color: white; }
        #normalBtn { background: var(--normal-color); color: #1a1a2e; }
        #gameBtn { background: var(--success-color); color: white; }
        #vvipBtn { background: var(--vvip-color); color: #1a1a2e; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="Gemini_Generated_Image_bf3ambf3ambf3amb.png" alt="Pig" class="hero-img">
        <h1>Piggy Lounge</h1>
        <p class="description">인증 후 입장 가능한 등급을 확인하세요.</p>
        <div id="status"></div>
        <button id="authBtn" class="btn" onclick="checkToken()">지갑 연결 및 등급 확인</button>
        <div id="actionButtons" class="hidden">
            <button id="normalBtn" class="btn" onclick="location.href='game.html'">🕹 일반 입장 (무료)</button>
            <button id="gameBtn" class="btn" onclick="enterRoom('VIP')">💎 VIP 전용 입장</button>
            <button id="vvipBtn" class="btn" onclick="enterRoom('VVIP')">👑 VVIP 전용 입장</button>
        </div>
    </div>

    <script>
        const PIGGY_ADDRESS = "0xd371B8EDE3329bb476f8AAF548b8fAc0e9910EA5";
        const MIN_BALANCE = 1000;
        const VVIP_BALANCE = 10000001;
        let userBalance = 0;

        async function checkToken() {
            const statusDiv = document.getElementById('status');
            const authBtn = document.getElementById('authBtn');
            const actionButtons = document.getElementById('actionButtons');

            try {
                if (typeof window.ethereum === 'undefined') throw new Error("No Wallet");
                
                statusDiv.style.display = "block";
                statusDiv.innerText = "⏳ 보유량 확인 중...";

                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const userAddress = await signer.getAddress();

                const abi = ["function balanceOf(address account) view returns (uint256)"];
                const contract = new ethers.Contract(PIGGY_ADDRESS, abi, provider);

                const balanceRaw = await contract.balanceOf(userAddress);
                userBalance = parseFloat(ethers.utils.formatEther(balanceRaw));
            } catch (err) {
                userBalance = 0;
            }

            authBtn.classList.add('hidden');
            actionButtons.classList.remove('hidden');
            updateStatusUI();
        }

        function updateStatusUI() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = "block";
            if (userBalance >= VVIP_BALANCE) {
                statusDiv.className = "vvip-status";
                statusDiv.innerHTML = `👑 VVIP 등급 확인 완료`;
            } else if (userBalance >= MIN_BALANCE) {
                statusDiv.className = "success";
                statusDiv.innerHTML = `✅ VIP 등급 확인 완료`;
            } else {
                statusDiv.style.display = "none";
            }
        }

        function enterRoom(type) {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = "block";
            
            if (type === 'VVIP') {
                if (userBalance >= VVIP_BALANCE) { location.href = 'game.html'; } 
                else { 
                    statusDiv.className = "info-box";
                    statusDiv.innerHTML = `⚠️ VVIP 입장은 ${VVIP_BALANCE.toLocaleString()} PIGI가 필요합니다.\n(VVIP 인증은 PC 환경에서만 가능합니다)`;
                }
            } else {
                if (userBalance >= MIN_BALANCE) { location.href = 'game.html'; } 
                else { 
                    statusDiv.className = "info-box";
                    statusDiv.innerHTML = `⚠️ VIP 입장은 ${MIN_BALANCE.toLocaleString()} PIGI가 필요합니다.\n(VIP 인증은 PC 환경에서만 가능합니다)`;
                }
            }
        }
    </script>
</body>
</html>
