<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piggy Run</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        canvas {
            background-color: #16213e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 캔버스 크기를 화면에 맞게 동적 조절
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth, 400);
            canvas.height = Math.min(window.innerHeight, 600);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let pig = { x: 50, y: canvas.height / 2, w: 40, h: 40, dy: 0 };
        let gravity = 0.5;
        let jump = -7;
        let obstacles = [];
        let score = 0;
        let frames = 0;
        let isGameOver = false;

        function drawPig() {
            ctx.fillStyle = '#e94560';
            ctx.fillRect(pig.x, pig.y, pig.w, pig.h);
        }

        function update() {
            if (isGameOver) return;

            pig.dy += gravity;
            pig.y += pig.dy;

            if (pig.y + pig.h > canvas.height || pig.y < 0) gameOver();

            if (frames % 100 === 0) {
                let gap = 160;
                let height = Math.random() * (canvas.height - gap - 100) + 50;
                obstacles.push({ x: canvas.width, y: 0, w: 50, h: height, type: 'top' });
                obstacles.push({ x: canvas.width, y: height + gap, w: 50, h: canvas.height, type: 'bottom' });
            }

            obstacles.forEach((obs, i) => {
                obs.x -= 2.5;
                if (pig.x < obs.x + obs.w && pig.x + pig.w > obs.x &&
                    pig.y < obs.y + obs.h && pig.y + pig.h > obs.y) gameOver();
                if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                    if (obs.type === 'top') score++;
                }
            });
            frames++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPig();
            ctx.fillStyle = '#4ecca3';
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(`Score: ${score}`, 20, 40);

            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "30px Arial";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
                ctx.font = "18px Arial";
                ctx.fillText("Tap to Restart", canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        function gameOver() { isGameOver = true; }
        function restart() {
            pig.y = canvas.height / 2; pig.dy = 0; obstacles = []; score = 0; frames = 0; isGameOver = false;
        }

        const handleInput = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            if (isGameOver) restart(); else pig.dy = jump;
        };
        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', handleInput, {passive: false});

        loop();
    </script>
</body>
</html>
